<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <style>
        /* Asosiy sozlamalar */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Profil qismi */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: #334155; border-radius: 50%; }
        .coins { background: #eab308; color: black; padding: 5px 15px; border-radius: 8px; font-weight: bold; }

        /* Asosiy karta */
        .card { background: #3b82f6; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }

        /* Ripple effekti (Suv tomchisi) */
        .ripple-btn {
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            transition: background 0.3s;
        }
        .ripple-btn .ripple {
            position: absolute;
            background: rgba(255,255,255,0.4);
            transform: scale(0);
            border-radius: 50%;
            animation: ripple-anim 0.6s linear;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* O'yinlar gridi */
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { background: #1e293b; height: 100px; border-radius: 15px; display: flex; justify-content: center; align-items: center; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-info">
            <div class="avatar"></div>
            <span>Khasanjon Umarov</span>
        </div>
        <div class="coins">33</div>
    </div>

    <div class="card">
        <div style="font-size: 20px; font-weight: bold;">200 so'm</div>
        <div style="opacity: 0.8; font-size: 12px; margin-bottom: 10px;">Telegram username</div>
        <div class="btn-grid">
            <button class="ripple-btn">Hisobni to'ldirish</button>
            <button class="ripple-btn">Bonus kodlar</button>
            <button class="ripple-btn">To'lov tarixi</button>
        </div>
    </div>

    <div class="games-grid">
        <div class="game-card">Game 1</div>
        <div class="game-card">Game 2</div>
        <div class="game-card">Game 3</div>
    </div>
</div>

<script>
    // Ripple effekt uchun JavaScript
    document.querySelectorAll('.ripple-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = e.clientX - rect.left - size/2 + 'px';
            ripple.style.top = e.clientY - rect.top - size/2 + 'px';
            ripple.classList.add('ripple');
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    });
</script>

</body>
</html>
