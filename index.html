<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donateouz</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
.pay-btn{
    background:#2c2f5a;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    text-align:center;
    color:white;
    cursor:pointer; /* 🔥 MUHIM */
}
.selected{
    background:green;
}
.pay-btn{
    z-index:999;
    position:relative;
}
.pay-btn{
    background:#2c2f5a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    text-align:center;
}
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px;
}

.user {
    display:flex;
    align-items:center;
}

.avatar {
    width:40px;
    height:40px;
    border-radius:50%;
    background:#444;
    margin-right:10px;
}

/* BALANCE CARD */
.balance {
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#6d5dfc,#4a3df0);
}

.balance h2 {
    margin:0;
}

.actions {
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

.action-btn {
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    width:30%;
    text-align:center;
    font-size:12px;
    cursor:pointer;
}

/* SECTION */
.section {
    padding:15px;
}

/* GAMES */
.games {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.game {
    width:30%;
    background:#1e293b;
    border-radius:15px;
    padding:5px;
    cursor:pointer;
}

.game img {
    width:100%;
    border-radius:10px;
}

.game p {
    text-align:center;
}

/* MODAL */
.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000000cc;
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    width:90%;
}

button {
    padding:10px;
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#6d5dfc;
    color:white;
}

/* NAVBAR */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#1e293b;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

.nav div {
    cursor:pointer;
}
</style>
</head>

<body>
<!-- STEP 1 -->
<div id="step1" style="display:none; padding:20px;">
    <h3>Hisob to‘ldirish</h3>

    <input id="amountInput" placeholder="Summani kiriting">

    <h4>To‘lov usuli:</h4>

  <div class="pay-btn" onclick="selectCard('uzcard', this)">Uzcard</div>
<div class="pay-btn" onclick="selectCard('humo', this)">Humo</div>
<div class="pay-btn" onclick="selectCard('visa', this)">Visa</div>

    <button onclick="goStep2()">Davom etish</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none; padding:20px;">
    <h3>To‘lov qiling</h3>

    <p>Karta raqam:</p>
    <b id="cardNumber"></b>

    <p id="timer" style="color:yellow;"></p>

    <button onclick="confirmPayment()">To‘lov qildim</button>
</div>
<div class="header">
    <div class="user">
        <div class="avatar"></div>
        <div id="username">User</div>
    </div>
    <div>🪙 <span id="coins">0</span></div>
</div>

<div class="balance">
    <h2 id="balance">0 so'm</h2>
    <p id="tg_username">@username</p>

    <div class="actions">
        <div class="action-btn" onclick="openTopup()">Hisob to‘ldirish</div>
        <div class="action-btn" onclick="openPage('bonus')">Bonus kodlar</div>
        <div class="action-btn" onclick="openPage('history')">To‘lov tarixi</div>
    </div>
</div>

<div class="section">
    <h3>O‘yinlar</h3>
    <div class="games">
        <div class="game" onclick="openGame('PUBG')">
            <img src="https://i.ibb.co/xGJ8H5v/pubg.jpg">
            <p>PUBG</p>
        </div>
        <div class="game" onclick="openGame('MLBB')">
            <img src="https://i.ibb.co/2dG9XKf/mlbb.jpg">
            <p>MLBB</p>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <input id="playerId" placeholder="ID kiriting">
        <button onclick="buy()">Sotib olish</button>
        <button onclick="closeModal()">Yopish</button>
    </div>
</div>

<!-- NAVBAR -->
<div class="nav">
    <div onclick="openPage('home')">🏠</div>
    <div onclick="openPage('gift')">🎁</div>
    <div onclick="openPage('history')">🕓</div>
    <div onclick="openPage('settings')">⚙️</div>
</div>
<div id="paymentPage" style="display:none; padding:20px; color:white;">

    <h3>Hisob to‘ldirish</h3>

    <!-- 1. SUMMA -->
    <input id="amountInput" placeholder="Miqdor kiriting">

    <button onclick="goToMethods()">Davom etish</button>

    <!-- 2. METHOD TANLASH -->
    <div id="methods" style="display:none; margin-top:20px;">
        <div onclick="selectMethod('uzcard')" class="pay-btn">Uzcard</div>
        <div onclick="selectMethod('humo')" class="pay-btn">Humo</div>
        <div onclick="selectMethod('visa')" class="pay-btn">Visa</div>
    </div>

    <!-- 3. TO‘LOV INFO -->
    <div id="paymentInfo" style="display:none; margin-top:20px;">
        <p>Karta raqam:</p>
        <b id="cardNumber"></b>

        <p id="timer" style="color:yellow;"></p>

        <button onclick="confirmPayment()">To‘lov qildim</button>
    </div>

</div>
<script>
let tg = window.Telegram.WebApp;
tg.expand();

/* USER DATA */
if(tg.initDataUnsafe.user){
    let user = tg.initDataUnsafe.user;

    document.getElementById("username").innerText = user.first_name;
    document.getElementById("tg_username").innerText = "@"+user.username;

    // 🔥 TEST QO‘SHILDI
    alert(
        "Ism: " + user.first_name + "\n" +
        "Username: @" + user.username + "\n" +
        "ID: " + user.id
    );
}

/* BALANCE LOCAL */
// ✅ SERVERDAN BALANS OLISH
function loadBalance(){
    fetch("http://127.0.0.1:5000/get_user", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: userId
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("balance").innerText = data.balance + " so'm";
    });
}

loadBalance();

/* NAVIGATION */
function openPage(page){
    alert(page + " bo‘limi (keyin kod yozamiz)");
}

/* GAME */
function openGame(name){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalTitle").innerText = name;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* BUY */
function buy(){
    let id = document.getElementById("playerId").value;

    if(!id){
        alert("ID kiriting");
        return;
    }

    fetch("http://127.0.0.1:5000/buy", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: userId,
            amount: 10
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.error){
            alert(data.error);
        } else {
            document.getElementById("balance").innerText = data.balance + " so'm";
            alert("Sotib olindi!");
        }
    });
}
// 🔥 PAYMENT LOGIKA
let selectedAmount = 0;
let selectedCard = "";

// PANELNI OCHISH
function openTopup(){
    document.getElementById("step1").style.display = "block";
    document.getElementById("step2").style.display = "none";
}

// KARTA TANLASH
function selectCard(type, el){
    selectedCard = type;

    // hamma tugmadan rangni olib tashlaymiz
    let btns = document.getElementsByClassName("pay-btn");
    for(let i=0;i<btns.length;i++){
        btns[i].classList.remove("selected");
    }

    // bosilganini belgilaymiz
    el.classList.add("selected");
}

// STEP 1 → STEP 2
let cards = {
    uzcard: "8600 1234 5678 9012",
    humo: "9860 1234 5678 9012",
    visa: "4277 1234 5678 9012"
};

function goStep2(){
    let amount = document.getElementById("amountInput").value;

    amount = parseInt(amount); // 🔥 ENG MUHIM QATOR

    if(!amount || amount < 1000){
        alert("Minimal 1000 so‘m");
        return;
    }

    if(!selectedCard){
        alert("Karta tanlang");
        return;
    }

    selectedAmount = amount;

    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";

    document.getElementById("cardNumber").innerText = cards[selectedCard];

    startTimer();
}

// TIMER
let timeLeft = 300;
let timerInterval;

function startTimer(){
    clearInterval(timerInterval);
    timeLeft = 300;

    timerInterval = setInterval(() => {
        let min = Math.floor(timeLeft / 60);
        let sec = timeLeft % 60;

        document.getElementById("timer").innerText =
            "Qolgan vaqt: " + min + ":" + (sec < 10 ? "0"+sec : sec);

        timeLeft--;

        if(timeLeft < 0){
            clearInterval(timerInterval);
            alert("Vaqt tugadi!");
            document.getElementById("step2").style.display = "none";
        }
    }, 1000);
}

// TASDIQLASH
function confirmPayment(){
    fetch("http://127.0.0.1:5000/topup", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: userId,
            amount: selectedAmount
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("balance").innerText = data.balance + " so'm";
        alert("To‘lov qabul qilindi!");
    });
}


function confirmPayment(){

    fetch("http://127.0.0.1:5000/topup", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: userId,
            amount: selectedAmount
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("balance").innerText = data.balance + " so'm";
        alert("To‘lov qabul qilindi!");
    });
}
// 🔥 TOPUP FUNKSIYA
function topup(amount){
    fetch("http://127.0.0.1:5000/topup", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: userId,
            amount: amount
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("balance").innerText = data.balance + " so'm";
        alert("Balans to‘ldirildi!");
    });
}
</script>

</body>
</html>
