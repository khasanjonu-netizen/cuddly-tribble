<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Donateouz Mini App</title>
<style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background: #f0f2f5; }
    header { background: #4a90e2; color: white; padding: 15px; text-align:center; font-size:20px; }
    .menu { display: flex; justify-content: space-around; background:#fff; padding:10px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    .menu div { cursor:pointer; padding:8px 15px; border-radius:5px; transition:0.3s; }
    .menu div:hover { background:#e0e0e0; }
    .games { display:flex; flex-wrap:wrap; justify-content: space-around; margin:20px; }
    .game-card { background:#fff; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); width:150px; margin:10px; text-align:center; cursor:pointer; transition:0.3s; }
    .game-card:hover { transform: scale(1.05); }
    .game-card img { width:100%; border-top-left-radius:10px; border-top-right-radius:10px; }
    .game-card p { margin:10px 0; font-weight:bold; }
    #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    #modal-content { background:#fff; padding:20px; border-radius:10px; width:80%; max-width:400px; text-align:center; }
    #modal-content input, #modal-content select { width:90%; padding:8px; margin:10px 0; }
    #modal-content button { padding:10px 20px; margin-top:10px; background:#4a90e2; color:white; border:none; border-radius:5px; cursor:pointer; }
    #modal-content button:hover { background:#357ABD; }
</style>
</head>
<body>

<header>Donateouz Mini App</header>

<div class="menu">
    <div onclick="showSection('topup')">Balansni to‘ldirish</div>
    <div onclick="showSection('about')">Biz haqimizda</div>
    <div onclick="showSection('tokens')">Tokenlarim</div>
</div>

<div class="games">
    <div class="game-card" onclick="openGameModal('PUBG')">
        <img src="https://i.ibb.co/xGJ8H5v/pubg.jpg" alt="PUBG">
        <p>PUBG</p>
    </div>
    <div class="game-card" onclick="openGameModal('MLBB')">
        <img src="https://i.ibb.co/2dG9XKf/mlbb.jpg" alt="MLBB">
        <p>MLBB</p>
    </div>
</div>

<div id="modal">
    <div id="modal-content">
        <h3 id="modal-title">O‘yin tanlandi</h3>
        <p id="selected-game"></p>
        <input type="text" id="user-id" placeholder="O‘yinchi ID sini kiriting">
        <select id="package">
            <option value="">Paketni tanlang</option>
            <option value="100">100 Almaz/UC</option>
            <option value="500">500 Almaz/UC</option>
            <option value="1000">1000 Almaz/UC</option>
        </select>
        <button onclick="buyToken()">Token olish</button>
        <p id="modal-message" style="color:green; font-weight:bold;"></p>
        <button onclick="closeModal()">Bekor qilish</button>
    </div>
</div>

<script>
let currentSection = '';
function showSection(section) {
    currentSection = section;
    alert('Siz "' + section + '" bo‘limiga o‘tdingiz');
}

function openGameModal(game) {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modal-title').innerText = game + ' token olish';
    document.getElementById('selected-game').innerText = 'Siz tanladingiz: ' + game;
    document.getElementById('modal-message').innerText = '';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

function buyToken() {
    let userId = document.getElementById('user-id').value.trim();
    let pkg = document.getElementById('package').value;
    if(!userId || !pkg){
        alert('Iltimos, ID va paketni tanlang');
        return;
    }
    // Bu yerda balansdan yechish va token berish logikasi bo‘ladi
    document.getElementById('modal-message').innerText = 'Token muvaffaqiyatli berildi! ID: '+userId+', Paket: '+pkg;
}
</script>

</body>
</html>
